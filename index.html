<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RITRO | Official Online Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #000000; color: #000; line-height: 1.6; }

        /* Navigation - Zara Style */
        nav {
            position: sticky; top: 0; width: 100%; padding: 20px 40px;
            background: rgba(255, 255, 255, 0.95); display: flex;
            justify-content: space-between; align-items: center; z-index: 1000;
        }
        .logo-text { font-size: 2.5rem; font-weight: 900; letter-spacing: 15px; text-decoration: none; color: #000; }
        .nav-links a { text-decoration: none; color: #000; margin-left: 25px; font-size: 0.75rem; text-transform: uppercase; font-weight: bold; }

        /* Hero Section */
        .hero {
            height: 90vh; width: 100%; background: #f4f4f4;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; text-align: center;
            background-image: url('hero-bg.jpg'); /* Replace with a real t-shirt photo later */
            background-size: cover; background-position: center;
        }
        .hero h2 { font-size: 3rem; font-weight: 300; letter-spacing: 5px; margin-bottom: 20px; }

        /* Product Grid */
        .container { padding: 60px 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .product-card { text-align: left; cursor: pointer; }
        .product-image { width: 100%; height: 450px; background: #f0f0f0; margin-bottom: 15px; transition: 0.3s; }
        .product-image:hover { opacity: 0.8; }
        .product-info h3 { font-size: 0.85rem; font-weight: bold; text-transform: uppercase; }
        .product-info p { font-size: 0.85rem; color: #666; }

        /* Footer */
        footer { padding: 60px 40px; border-top: 1px solid #eee; font-size: 0.7rem; color: #888; text-align: center; text-transform: uppercase; letter-spacing: 1px; }

        @media (max-width: 768px) {
            .logo-text { font-size: 1.5rem; letter-spacing: 8px; }
            .nav-links { display: none; } /* Simplified for mobile */
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo-text">RITRO</a>
        <div class="nav-links">
            <a href="#">New Arrivals</a>
            <a href="#">Collection</a>
            <a href="#">About</a>
            <a href="#">Blogs</a>
            <a href="#">Search</a>
        </div>
    </nav>

    <header class="hero">
        <h2>NEW COLLECTION</h2>
        <p><b>Make Your Fashion Better With RITRO</b></p>
    </header>

    <div class="container">
        <div class="grid">
            <div class="product-card">
                <div class="product-image">
                    </div>
                <div class="product-info">
                    <h3>Oversized Graphic Tee</h3>
                    <p><b>3,500 BDT</b></p>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image"></div>
                <div class="product-info">
                    <h3>Classic RITRO Hoodie</h3>
                    <p><b>5,200 BDT</b></p>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image"></div>
                <div class="product-info">
                    <h3>Minimalist Sweatpants</h3>
                    <p><b></b>4,000 BDT</b></p>
                </div>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 RITRO Fashion. All rights reserved. <br>
        Bangladesh | Global Shipping
    </footer>

</body>
</html>
