<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RITRO | Official Online Store</title>
    <style>
        /* CSS Variables for Global Brand Identity */
        :root {
            --brand-main: #000000;
            --brand-secondary: #767676;
            --bg-light: #f9f9f9;
            --white: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Reset & Base Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: var(--white); color: var(--brand-main); line-height: 1.5; overflow-x: hidden; }
        
        /* Navigation - Fixed Premium Header */
        header {
            position: fixed; top: 0; width: 100%; height: 80px;
            background: rgba(255, 255, 255, 0.98); display: flex;
            justify-content: space-between; align-items: center;
            padding: 0 5%; z-index: 5000; border-bottom: 1px solid #eee;
        }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 12px; cursor: pointer; text-transform: uppercase; }
        
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav ul li a { 
            font-size: 11px; font-weight: bold; letter-spacing: 2px; 
            text-transform: uppercase; text-decoration: none; color: var(--brand-main);
            transition: var(--transition);
        }
        nav ul li a:hover { color: var(--brand-secondary); }

        .nav-tools { display: flex; gap: 20px; align-items: center; }
        .tool-btn { background: none; border: none; font-size: 11px; font-weight: bold; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; }
        .cart-count { background: #000; color: #fff; padding: 2px 6px; border-radius: 50%; font-size: 9px; margin-left: 4px; }

        /* Hero Section */
        .hero {
            height: 80vh; background: var(--bg-light); display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; margin-top: 80px;
        }
        .hero h1 { font-size: 70px; font-weight: 200; letter-spacing: 20px; text-transform: uppercase; margin-bottom: 20px; }
        .hero p { letter-spacing: 5px; font-size: 12px; color: var(--brand-secondary); margin-bottom: 40px; }

        /* Store Grid System */
        .container { padding: 80px 5%; }
        .section-header { 
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 15px;
        }
        .section-header h2 { font-size: 12px; letter-spacing: 4px; text-transform: uppercase; }

        .product-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 40px; 
        }
        .product-card { position: relative; cursor: pointer; transition: var(--transition); }
        .product-image-box { position: relative; width: 100%; height: 450px; background: #f2f2f2; overflow: hidden; }
        .product-image-box img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .product-card:hover img { transform: scale(1.05); }

        .add-to-bag-overlay {
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.9);
            color: #fff; text-align: center; padding: 18px; font-size: 10px;
            letter-spacing: 3px; transform: translateY(100%); transition: var(--transition);
        }
        .product-card:hover .add-to-bag-overlay { transform: translateY(0); }

        .product-info { display: flex; justify-content: space-between; padding: 15px 0; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }

        /* Shopping Bag Sidebar */
        #cart-sidebar {
            position: fixed; right: -450px; top: 0; width: 450px; height: 100vh;
            background: var(--white); z-index: 6000; box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            padding: 40px; transition: var(--transition); display: flex; flex-direction: column;
        }
        #cart-sidebar.active { right: 0; }
        .cart-top { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }
        .cart-items { flex: 1; overflow-y: auto; }
        .cart-item { display: flex; gap: 20px; margin-bottom: 25px; align-items: center; border-bottom: 1px solid #f9f9f9; padding-bottom: 15px; }
        .cart-item img { width: 70px; height: 90px; object-fit: cover; background: #eee; }
        .cart-footer { padding-top: 20px; border-top: 2px solid #000; }
        .checkout-btn { width: 100%; background: #000; color: #fff; padding: 20px; border: none; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; margin-top: 20px; }

        /* Search Overlay */
        #search-overlay {
            position: fixed; inset: 0; background: #fff; z-index: 7000;
            display: none; padding: 100px 10%; animation: fadeIn 0.3s ease;
        }
        #search-overlay.active { display: block; }
        .search-box input { width: 100%; border: none; border-bottom: 2px solid #000; padding: 20px 0; font-size: 30px; text-transform: uppercase; outline: none; letter-spacing: 4px; }

        /* Footer */
        footer { padding: 100px 5%; border-top: 1px solid #eee; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 50px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        footer h4 { margin-bottom: 25px; font-size: 12px; }
        footer a { display: block; text-decoration: none; color: var(--brand-secondary); margin-bottom: 12px; }
        footer a:hover { color: #000; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        @media (max-width: 768px) {
            #cart-sidebar { width: 100%; right: -100%; }
            .hero h1 { font-size: 40px; }
            nav { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="window.scrollTo(0,0)">RITRO</div>
        <nav>
            <ul>
                <li><a href="#store">New Arrivals</a></li>
                <li><a href="#store" onclick="filterData('Collection')">Collection</a></li>
                <li><a href="#" onclick="alert('Journal loading...')">Journal</a></li>
            </ul>
        </nav>
        <div class="nav-tools">
            <button class="tool-btn" onclick="toggleSearch()">Search</button>
            <button class="tool-btn" onclick="toggleCart()">Bag <span class="cart-count" id="count-display">0</span></button>
        </div>
    </header>

    <div id="cart-sidebar">
        <div class="cart-top">
            <h3 style="letter-spacing: 2px;">YOUR SHOPPING BAG</h3>
            <button class="tool-btn" onclick="toggleCart()">Close</button>
        </div>
        <div class="cart-items" id="cart-content">
            </div>
        <div class="cart-footer">
            <div style="display: flex; justify-content: space-between; font-weight: bold;">
                <span>SUBTOTAL</span>
                <span id="total-display">0 BDT</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
        </div>
    </div>

    <div id="search-overlay">
        <div class="search-box">
            <button class="tool-btn" style="float: right; font-size: 20px;" onclick="toggleSearch()">&times;</button>
            <input type="text" id="search-input" placeholder="Search the collection..." onkeyup="liveSearch()">
        </div>
    </div>

    <section class="hero">
        <h1>RITRO</h1>
        <p>PREMIUM QUALITY & BRAND IDENTITY</p>
        <a href="#store" class="checkout-btn" style="width: auto; padding: 15px 40px; text-decoration: none;">Explore Collection</a>
    </section>

    <section class="container" id="store">
        <div class="section-header">
            <h2 id="cat-label">All Items</h2>
            <div style="font-size: 10px; color: #888;">2026 EDITION</div>
        </div>
        <div class="product-grid" id="grid-root">
            </div>
    </section>

    <footer>
        <div>
            <h4>Support</h4>
            <a href="#">Track Order</a>
            <a href="#">Shipping & Returns</a>
            <a href="#">Size Guide</a>
        </div>
        <div>
            <h4>Company</h4>
            <a href="#">Our Story</a>
            <a href="#">Sustainability</a>
            <a href="#">Legal</a>
        </div>
        <div>
            <h4>Connect</h4>
            <a href="https://www.instagram.com/ritroclothing/" target="_blank">Instagram</a>
            <a href="https://www.facebook.com/profile.php?id=61574659364171" target="_blank">Facebook</a>
        </div>
    </footer>

    <script>
        /* 1. DATA CENTER: Real products database */
        const inventory = [
            { id: 101, name: "Essential Oversized Tee", price: 3500, cat: "New Arrivals", img: "product1.jpg" },
            { id: 102, name: "Signature Identity Hoodie", price: 5200, cat: "Collection", img: "product2.jpg" },
            { id: 103, name: "Premium Cotton Joggers", price: 4000, cat: "Collection", img: "product3.jpg" },
            { id: 104, name: "RITRO Studio Cap", price: 1800, cat: "New Arrivals", img: "product4.jpg" }
        ];

        let shoppingBag = JSON.parse(localStorage.getItem('ritro_bag')) || [];

        /* 2. RENDER ENGINE: Builds the website visually */
        function initStore(data) {
            const grid = document.getElementById('grid-root');
            grid.innerHTML = data.map(item => `
                <div class="product-card" onclick="alert('Viewing ${item.name}')">
                    <div class="product-image-box">
                        <img src="${item.img}" onerror="this.src='https://via.placeholder.com/450x600?text=RITRO+PIECE'">
                        <div class="add-to-bag-overlay" onclick="event.stopPropagation(); addToBag(${item.id})">ADD TO BAG</div>
                    </div>
                    <div class="product-info">
                        <span>${item.name}</span>
                        <span style="color: #888;">${item.price.toLocaleString()} BDT</span>
                    </div>
                </div>
            `).join('');
        }

        /* 3. FUNCTIONALITY: All options working properly */
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }
        function toggleSearch() { document.getElementById('search-overlay').classList.toggle('active'); }

        function addToBag(id) {
            const item = inventory.find(i => i.id === id);
            shoppingBag.push(item);
            updateUI();
            toggleCart();
        }

        function removeFromBag(index) {
            shoppingBag.splice(index, 1);
            updateUI();
        }

        function updateUI() {
            localStorage.setItem('ritro_bag', JSON.stringify(shoppingBag));
            const content = document.getElementById('cart-content');
            const totalDisplay = document.getElementById('total-display');
            const countDisplay = document.getElementById('count-display');
            
            countDisplay.innerText = shoppingBag.length;
            
            if(shoppingBag.length === 0) {
                content.innerHTML = '<p style="text-align:center; margin-top:50px; color:#888; font-size:11px;">BAG IS EMPTY</p>';
                totalDisplay.innerText = "0 BDT";
            } else {
                let total = 0;
                content.innerHTML = shoppingBag.map((item, index) => {
                    total += item.price;
                    return `
                        <div class="cart-item">
                            <img src="${item.img}" onerror="this.src='https://via.placeholder.com/70x90?text=ITEM'">
                            <div style="flex:1">
                                <p style="font-size:11px; font-weight:bold;">${item.name}</p>
                                <p style="font-size:10px; color:#888;">${item.price.toLocaleString()} BDT</p>
                                <button onclick="removeFromBag(${index})" style="background:none; border:none; color:red; cursor:pointer; font-size:9px; margin-top:5px;">REMOVE</button>
                            </div>
                        </div>
                    `;
                }).join('');
                totalDisplay.innerText = total.toLocaleString() + " BDT";
            }
        }

        function liveSearch() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const results = inventory.filter(i => i.name.toLowerCase().includes(query));
            initStore(results);
        }

        function filterData(category) {
            document.getElementById('cat-label').innerText = category;
            const filtered = inventory.filter(i => i.cat === category);
            initStore(filtered);
        }

        function checkout() {
            if(shoppingBag.length === 0) return alert("Bag is empty!");
            alert("RITRO SECURE CHECKOUT\nProcessing payment...");
            shoppingBag = [];
            updateUI();
            toggleCart();
        }

        // Initialize App
        window.onload = () => {
            initStore(inventory);
            updateUI();
        }
    </script>
</body>
</html>
